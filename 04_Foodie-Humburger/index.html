<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <header>
        <div class="logo">
            <img src="./images/foodie hamburger logo.png" alt="">
        </div>
        <div class="humburger-menue-Container">
         <span class="hamburger-icon">&#9776;</span>
        </div>
            <nav>
                <span>&times;</span>
                <a href="#picks">Top Picks</a>
                <a href="#Whopper">Whopper</a>
                <a href="#Menu">Stunner Menu</a>
                <a href="#FoodieCollection">New Foodie Collection</a>
                <a href="#DealOfDay">Deal of the Day</a>
            </nav>
    </header>
    <main>
        <section class="burger">
            <img src="./images/Group 2.png" alt="">
            <p>Well, You can’t resist anymore!</p>
        </section>
        <section class="picks">
            <div>
                <h2 id="picks">Top Picks</h2>
            </div>
            <img src="./images/top_picks.png" alt="">
        </section>
           <section class="picks Whopper">
            <div>
                <h2 id="Whopper">Whopper</h2>
            </div>
            <img src="./images/whoper.png" alt="img not found">
        </section>
           <section class="picks Stunner_Menu">
            <div>
                <h2 id="Menu">Stunner Menu</h2>
            </div>
            <img src="./images/menu.png" alt="img not found">
        </section>
           <section class="picks  FoodieCollection">
            <div>
                <h2 id="FoodieCollection">New Foodie Collection</h2>
            </div>
            <img src="./images/food_collection.png" alt="img not found">
        </section>
           <section class="picks DealOfDay">
            <div>
                <h2 id="DealOfDay">Deal of the Day</h2>
            </div>
            <img src="./images/dealOFday.png" alt="img not found">
        </section>
        </section>
        <section class="picks goBack">
            <a href="">Go to Back</a>
        </section>
         <section class="picks madeBy">
            <p>Made by ❤️ Zohaib</p>
        </section>
    </main>
</body>
</html>
