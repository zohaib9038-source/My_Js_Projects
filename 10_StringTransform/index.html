<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="stringTransform">
        <div class="input">
            <input type="text" name="input_Filed" id="input_Field" placeholder="Enter sentence with(space)">
        </div>
        <div class="capital transform_Output">
            <span>Upper Case</span>
            <p id="capitalization"></p>
        </div>
        <div class="LowerCase transform_Output">
            <span>LowerCase</span>
            <p id="LowerCaseWord"></p>
        </div>
        <div class="CamelCase transform_Output">
            <span>CamelCase</span>
            <p id="CamelCaseWord"></p>
        </div>
        <div class="snake transform_Output">
            <span>snakecase</span>
            <p id="snake_case"></p>
        </div>
        <div class="kabab transform_Output">
            <span>kabab case</span>
            <p id="kabab_case"></p>
        </div>
         <div class="kabab transform_Output">
            <span>PascalCase</span>
            <p id="pascal_case"></p>
        </div>
        <div class="Trim transform_Output">
            <span>Trim</span>
            <p id="TrimWord"></p>
        </div>

    </div>
</body>

</html>
